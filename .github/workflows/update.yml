name: "Update"

on:
  workflow_dispatch:
  schedule:
    - cron: '8 3 * * *' 

jobs:
  updater:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare packages
        run: sudo apt-get install -y whois jq ripgrep parallel

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('utils/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install -r utils/requirements.txt


      - name: Download IPs
        run: |
          # Run every downloader, capturing exit codes. A single failing source must
          # NOT abort the run (so we drop `set -e`); failures are tallied and reported.
          set -uo pipefail
          total=0
          failed=0
          : > /tmp/dl_failed_list
          while IFS= read -r d; do
            total=$((total + 1))
            echo "::group::$d"
            if bash "$d"; then
              echo "OK: $d"
            else
              rc=$?
              failed=$((failed + 1))
              echo "FAILED (exit $rc): $d"
              echo "$d" >> /tmp/dl_failed_list
            fi
            echo "::endgroup::"
          done < <(find . -name downloader.sh | sort -h)
          echo "$total"  > /tmp/dl_total
          echo "$failed" > /tmp/dl_failed
          {
            echo "## Download results"
            echo ""
            echo "- Downloaders run: **$total**"
            echo "- Failed: **$failed**"
            if [ "$failed" -gt 0 ]; then
              echo ""
              echo "### ❌ Failed downloaders"
              while IFS= read -r f; do echo "- \`$f\`"; done < /tmp/dl_failed_list
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Merge ipv4 Ranges
        run: |
          set -euo pipefail
          set -x
          find . -name ipv4.txt| sort -h | parallel --will-cite -j 1 echo "Merging '{}'"';'python utils/merge.py --source={} '|'  sort -h '>' {.}_merged.txt


      - name: Merge ipv6 Ranges
        run: |
          set -euo pipefail
          set -x
          find . -name ipv6.txt| sort -h | parallel --will-cite -j 1 echo "Merging '{}'"';'python utils/merge.py --source={} '|' sort -h '>' {.}_merged.txt


      - name: Sanity floor
        run: |
          # Protect against a broken upstream wiping a good list: revert any merged
          # list (and its raw .txt) that collapsed to empty or lost >66% of its lines
          # vs the last commit. Brand-new files (not yet committed) are left alone.
          set -uo pipefail
          reverts=0
          : > /tmp/reverted_list
          while IFS= read -r merged; do
            path="${merged#./}"
            git cat-file -e "HEAD:$path" 2>/dev/null || continue
            old=$(git show "HEAD:$path" | wc -l | tr -d ' ')
            new=$(wc -l < "$path" | tr -d ' ')
            if [ "$old" -gt 0 ] && { [ "$new" -eq 0 ] || [ $((new * 3)) -lt "$old" ]; }; then
              raw="${path/_merged/}"
              echo "REVERT: $path ($old -> $new lines), restoring $raw too"
              git checkout HEAD -- "$path"
              git cat-file -e "HEAD:$raw" 2>/dev/null && git checkout HEAD -- "$raw" || true
              reverts=$((reverts + 1))
              echo "| \`$path\` | $old | $new |" >> /tmp/reverted_list
            fi
          done < <(find . -name '*_merged.txt' | sort -h)
          echo "$reverts" > /tmp/reverts
          {
            echo ""
            if [ "$reverts" -gt 0 ]; then
              echo "### ⚠️ Reverted lists (empty or >66% drop)"
              echo ""
              echo "| file | previous | new |"
              echo "|------|---------:|----:|"
              cat /tmp/reverted_list
            else
              echo "Sanity floor: no lists reverted ✅"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update service lists
        run: |
          set -euo pipefail
          set -x
          find . -name ipv4_merged.txt -not -empty | sed 's|^\./||' | sort -h > ipv4-services.txt
          find . -name ipv6_merged.txt -not -empty | sed 's|^\./||' | sort -h > ipv6-services.txt

      - name: Commit files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git remote add github "https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git pull github ${GITHUB_REF} --ff-only

          # Get name & email from 1st commit
          git config --local user.email "$(git log --format='%ae' --reverse | head -1)"
          git config --local user.name "$(git log --format='%an' --reverse | head -1)"

          # try commit
          git add .
          if [ -z "$(git status --porcelain)" ]; then
            echo 'No changes'
            exit 0
          fi
          git commit -m "Auto-update ip ranges"

          # push changes
          git push github HEAD:${GITHUB_REF}

      - name: Fail on systemic outage
        if: always()
        run: |
          # Good data is already committed above. Only now do we decide whether to
          # alert: turn the job red (-> email) if >=50% of downloaders failed, which
          # signals a network/runner problem rather than a single flaky source.
          set -uo pipefail
          total=$(cat /tmp/dl_total 2>/dev/null || echo 0)
          failed=$(cat /tmp/dl_failed 2>/dev/null || echo 0)
          reverts=$(cat /tmp/reverts 2>/dev/null || echo 0)
          echo "Summary: $failed/$total downloaders failed, $reverts list(s) reverted."
          if [ "$total" -gt 0 ] && [ $((failed * 2)) -ge "$total" ]; then
            echo "::error::Systemic outage: $failed/$total downloaders failed (>=50%)."
            {
              echo ""
              echo "## ❌ Systemic outage: $failed/$total downloaders failed (≥50%)"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "No systemic outage — job stays green."
